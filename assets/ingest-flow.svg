<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-label="Ingest workflow">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="280" rx="16" fill="#f8fafc"/>
  <text x="460" y="34" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">Ingest workflow</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <rect x="40" y="80" width="150" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
    <text x="115" y="108" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">You</text>
    <text x="115" y="132" text-anchor="middle" fill="#64748b" font-size="11">Drop source</text>
    <text x="115" y="150" text-anchor="middle" fill="#64748b" font-size="11">in raw/</text>
    <text x="115" y="176" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="600">raw/article.md</text>

    <rect x="250" y="80" width="170" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
    <text x="335" y="108" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Agent</text>
    <text x="335" y="132" text-anchor="middle" fill="#64748b" font-size="11">Reads AGENTS.md</text>
    <text x="335" y="150" text-anchor="middle" fill="#64748b" font-size="11">+ wiki tools (MCP)</text>
    <text x="335" y="176" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="600">"Ingest raw/…"</text>

    <rect x="480" y="60" width="400" height="160" rx="12" fill="#fff" stroke="#cbd5e1"/>
    <text x="680" y="88" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Wiki updates (one pass)</text>
    <text x="510" y="118" fill="#475569" font-size="11">• sources/article.md — summary + links</text>
    <text x="510" y="140" fill="#475569" font-size="11">• entities/ + concepts/ — create or update</text>
    <text x="510" y="162" fill="#475569" font-size="11">• synthesis.md — revise thesis</text>
    <text x="510" y="184" fill="#475569" font-size="11">• index.md + log.md — catalog + timeline</text>
    <text x="510" y="206" fill="#475569" font-size="11">• contradictions.md — flag conflicts</text>
  </g>

  <line x1="190" y1="140" x2="248" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="140" x2="478" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="460" y="252" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Knowledge compiles once. Later queries read the wiki — not re-chunk raw files.</text>
</svg>