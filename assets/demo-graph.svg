<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-label="Demo wiki link graph">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="920" height="520" rx="16" fill="#0b1220"/>
  <text x="460" y="36" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">Demo wiki graph (after one ingest)</text>
  <text x="460" y="58" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">examples/demo — 10 linked pages from a single source</text>

  <!-- edges -->
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.85">
    <line x1="460" y1="250" x2="200" y2="130"/>
    <line x1="460" y1="250" x2="720" y2="130"/>
    <line x1="460" y1="250" x2="140" y2="250"/>
    <line x1="460" y1="250" x2="300" y2="360"/>
    <line x1="460" y1="250" x2="460" y2="390"/>
    <line x1="460" y1="250" x2="620" y2="360"/>
    <line x1="460" y1="250" x2="780" y2="250"/>
    <line x1="300" y1="360" x2="140" y2="250"/>
    <line x1="300" y1="360" x2="620" y2="360"/>
    <line x1="620" y1="360" x2="780" y2="250"/>
    <line x1="460" y1="390" x2="300" y2="360"/>
    <line x1="460" y1="390" x2="780" y2="250"/>
    <line x1="200" y1="130" x2="300" y2="360"/>
    <line x1="720" y1="130" x2="620" y2="360"/>
    <line x1="200" y1="130" x2="140" y2="250"/>
    <line x1="720" y1="130" x2="620" y2="360"/>
  </g>

  <!-- nodes -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <g>
      <circle cx="460" cy="250" r="52" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
      <text x="460" y="246" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">source</text>
      <text x="460" y="262" text-anchor="middle" fill="#1e293b" font-size="10">karpathy gist</text>
    </g>
    <g>
      <circle cx="200" cy="130" r="38" fill="#38bdf8" stroke="#7dd3fc" stroke-width="2"/>
      <text x="200" y="126" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="600">entity</text>
      <text x="200" y="140" text-anchor="middle" fill="#0f172a" font-size="9">karpathy</text>
    </g>
    <g>
      <circle cx="720" cy="130" r="38" fill="#38bdf8" stroke="#7dd3fc" stroke-width="2"/>
      <text x="720" y="126" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="600">entity</text>
      <text x="720" y="140" text-anchor="middle" fill="#0f172a" font-size="9">vannevar bush</text>
    </g>
    <g>
      <circle cx="140" cy="250" r="40" fill="#a78bfa" stroke="#c4b5fd" stroke-width="2"/>
      <text x="140" y="246" text-anchor="middle" fill="#1e1b4b" font-size="9" font-weight="600">compounding</text>
      <text x="140" y="260" text-anchor="middle" fill="#1e1b4b" font-size="9">knowledge</text>
    </g>
    <g>
      <circle cx="780" cy="250" r="34" fill="#a78bfa" stroke="#c4b5fd" stroke-width="2"/>
      <text x="780" y="254" text-anchor="middle" fill="#1e1b4b" font-size="10" font-weight="600">RAG</text>
    </g>
    <g>
      <circle cx="300" cy="360" r="34" fill="#a78bfa" stroke="#c4b5fd" stroke-width="2"/>
      <text x="300" y="364" text-anchor="middle" fill="#1e1b4b" font-size="10" font-weight="600">memex</text>
    </g>
    <g>
      <circle cx="460" cy="390" r="34" fill="#34d399" stroke="#6ee7b7" stroke-width="2"/>
      <text x="460" y="394" text-anchor="middle" fill="#064e3b" font-size="10" font-weight="600">synthesis</text>
    </g>
    <g>
      <circle cx="620" cy="360" r="34" fill="#a78bfa" stroke="#c4b5fd" stroke-width="2"/>
      <text x="620" y="356" text-anchor="middle" fill="#1e1b4b" font-size="9" font-weight="600">wiki</text>
      <text x="620" y="370" text-anchor="middle" fill="#1e1b4b" font-size="9">ingest</text>
    </g>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#cbd5e1">
    <rect x="36" y="440" width="14" height="14" rx="3" fill="#f59e0b"/>
    <text x="58" y="452">Source</text>
    <rect x="130" y="440" width="14" height="14" rx="3" fill="#38bdf8"/>
    <text x="152" y="452">Entity</text>
    <rect x="220" y="440" width="14" height="14" rx="3" fill="#a78bfa"/>
    <text x="242" y="452">Concept</text>
    <rect x="320" y="440" width="14" height="14" rx="3" fill="#34d399"/>
    <text x="342" y="452">Synthesis</text>
    <text x="36" y="490" fill="#64748b">One file in raw/ → agent updates 10+ interlinked pages. Open examples/demo in Obsidian for the live graph.</text>
  </g>
</svg>